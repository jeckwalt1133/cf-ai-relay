name: Download LTX Encoder
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install HF CLI
        run: pip install huggingface_hub

      - name: Download Text Encoder
        run: |
          python3 << 'PYEOF'
          from huggingface_hub import snapshot_download
          import os
          print('Downloading LTX2.3 text encoder...')
          snapshot_download(
              'Kijai/LTX2.3_comfy',
              allow_patterns=['*text_encoder*', '*tokenizer*', '*text*', '*config*'],
              local_dir='./encoder',
              local_dir_use_symlinks=False
          )
          print('Files:')
          for f in os.listdir('./encoder'):
              sz = os.path.getsize(os.path.join('./encoder', f))
              print(f'  {f} ({sz//1024//1024}MB)')
          PYEOF

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ltx-encoder
          path: ./encoder/*
          retention-days: 3
