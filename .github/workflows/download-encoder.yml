name: Download Encoder to Repo
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Download encoder from HF
        run: |
          pip install huggingface_hub
          python3 << 'PYEOF'
          from huggingface_hub import snapshot_download
          import os, shutil
          os.makedirs('encoder_files', exist_ok=True)
          snapshot_download(
              'Kijai/LTX2.3_comfy',
              allow_patterns=['*text_encoder*', '*tokenizer*', '*text*', '*config*', '*gemma*'],
              local_dir='encoder_files',
              local_dir_use_symlinks=False
          )
          # 列出并显示大小
          for f in os.listdir('encoder_files'):
              sz = os.path.getsize(os.path.join('encoder_files', f))
              print(f'{f}: {sz//1024//1024}MB')
          PYEOF
          
      - name: Commit to repo
        run: |
          git config user.name 'Skynet'
          git config user.email 'skynet@cf-ai-relay.dev'
          # 只添加小块文件(<50MB), 跳过大文件
          for f in encoder_files/*; do
              sz=
              if [  -lt 50000000 ]; then
                  cp "" repo_encoder/
              fi
          done
          mkdir -p repo_encoder
          cp encoder_files/* repo_encoder/ 2>/dev/null || true
          git add repo_encoder/
          git commit -m 'Add encoder files' || echo 'No changes'
          git push || echo 'Push failed'
