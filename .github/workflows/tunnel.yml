name: GitTunnel
on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'HF仓库'
        required: true
      pattern:
        description: '文件匹配'
        required: true
      target_dir:
        description: '目标目录'
        required: false
        default: 'tunnel_data'

permissions:
  contents: write

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download
        run: |
          pip install huggingface_hub -q
          python3 -c "
          from huggingface_hub import snapshot_download
          import os, subprocess as sp
          repo = '${{ inputs.repo }}'
          patterns = '${{ inputs.pattern }}'.split()
          os.makedirs('${{ inputs.target_dir }}', exist_ok=True)
          snapshot_download(repo, allow_patterns=patterns, local_dir='${{ inputs.target_dir }}', local_dir_use_symlinks=False)
          for f in os.listdir('${{ inputs.target_dir }}'):
              sz = os.path.getsize(f'${{ inputs.target_dir }}/{f}')
              print(f'{f}: {sz//1024//1024}MB')
          "

      - name: Upload via gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd ${{ inputs.target_dir }}
          for f in *; do
            if [ -f "$f" ]; then
              sz=$(stat -c%s "$f" 2>/dev/null || ls -l "$f" | awk '{print $5}')
              echo "Uploading $f ($sz bytes)..."
              gh api repos/${{ github.repository }}/contents/${{ inputs.target_dir }}/$f \
                -X PUT \
                -f message="tunnel: $f" \
                -f content="$(base64 -w0 "$f")" \
                -f branch=master 2>&1 | head -3
            fi
          done
