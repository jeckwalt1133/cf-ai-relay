name: GitTunnel v3
on:
  workflow_dispatch:
    inputs:
      url:
        description: '下载URL'
        required: true
      filename:
        description: '文件名'
        required: true

permissions:
  contents: write

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download
        run: |
          mkdir -p tunnel_data
          cd tunnel_data
          curl -sL "${{ inputs.url }}" -o "${{ inputs.filename }}" -w "HTTP %{http_code}\n" || wget -q "${{ inputs.url }}" -O "${{ inputs.filename }}"
          ls -la
          cd ..

      - name: Commit
        run: |
          git config user.name "Tunnel"
          git config user.email "tunnel@skynet.dev"
          git add tunnel_data/
          git commit -m "tunnel: ${{ inputs.filename }}" 2>&1
          git push origin HEAD:master 2>&1
