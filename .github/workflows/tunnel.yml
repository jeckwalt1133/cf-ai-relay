name: GitTunnel
on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'HF repo'
        required: true
      pattern:
        description: 'File pattern'
        required: true

permissions:
  contents: write

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download and Upload
        run: |
          pip install huggingface_hub -q

          # Download
          python3 -c "
          from huggingface_hub import snapshot_download
          import os, subprocess as sp
          r = '${{ inputs.repo }}'
          p = '${{ inputs.pattern }}'.split()
          os.makedirs('dl', exist_ok=True)
          snapshot_download(r, allow_patterns=p, local_dir='dl', local_dir_use_symlinks=False)
          for f in os.listdir('dl'):
              sz = os.path.getsize(f'dl/{f}')
              print(f'{f}: {sz//1048576}MB')
              # Split files >40MB
              if sz > 40_000_000:
                  print(f'Splitting {f} into 40MB chunks...')
                  sp.run(['split', '-b', '40M', '-d', f'dl/{f}', f'dl/{f}.chunk_'], check=True)
                  os.remove(f'dl/{f}')
          print('Done. Files:')
          for f in sorted(os.listdir('dl')):
              print(f'  {f}')
          "

          # Upload each file via gh api (works for files <100MB)
          cd dl
          for f in *; do
            if [ -f "$f" ]; then
              sz=$(stat -c%s "$f" 2>/dev/null || ls -l "$f" | awk '{print $5}')
              echo "Upload $f ($sz bytes)..."
              B64=$(base64 -w0 "$f")
              gh api "repos/${{ github.repository }}/contents/tunnel_clip/$f" \
                -X PUT \
                -f message="chunk: $f" \
                -f content="$B64" \
                -f branch=master 2>&1 | grep -E '(HTTP|message|created)' | head -3
            fi
          done
