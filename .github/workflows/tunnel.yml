name: List Encoder Files
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: List HF files
        run: |
          pip install huggingface_hub -q
          python3 << 'PYEOF'
          from huggingface_hub import list_repo_files
          files = list_repo_files('Kijai/LTX2.3_comfy')
          # 只看 encoder 相关文件
          for f in files:
              if any(kw in f.lower() for kw in ['text', 'encoder', 'token', 'config', 'gemma', 'model']):
                  print(f)
          PYEOF
