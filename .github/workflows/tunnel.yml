name: GitTunnel
on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'HF repo'
        required: true
      pattern:
        description: 'File pattern'
        required: true
        default: '*'

permissions:
  contents: write

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download
        env:
          REPO: ${{ inputs.repo }}
          PATTERN: ${{ inputs.pattern }}
        run: |
          pip install huggingface_hub -q
          python3 -c "
          from huggingface_hub import snapshot_download
          import os
          r = os.environ['REPO']
          p = os.environ['PATTERN'].split()
          os.makedirs('dl', exist_ok=True)
          snapshot_download(r, allow_patterns=p, local_dir='dl', local_dir_use_symlinks=False)
          for f in os.listdir('dl'):
              print(f'{f}: {os.path.getsize(f\"dl/{f}\")//1048576}MB')
          "

      - name: Upload via Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dl
          TAG="clip-$(date +%s)"
          gh release create "$TAG" --title "CLIP Model" --notes "openai/clip-vit-large-patch14" 2>&1
          for f in *; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber 2>&1
          done
          echo "Release tag: $TAG"
