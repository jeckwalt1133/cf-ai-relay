name: GitTunnel
on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'HF repo'
        required: true
      pattern:
        description: 'File pattern'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  # 第一步：下载到 artifact
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download from HF
        run: |
          pip install huggingface_hub -q
          mkdir -p dl
          python3 -c "
          from huggingface_hub import snapshot_download
          import os
          snapshot_download('${{ inputs.repo }}', allow_patterns='${{ inputs.pattern }}'.split(), local_dir='dl', local_dir_use_symlinks=False)
          for f in os.listdir('dl'):
              print(f'{f}: {os.path.getsize(f\"dl/{f}\")//1048576}MB')
          "
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-files
          path: dl/*
          retention-days: 1

  # 第二步：从 artifact 取文件，拆分后上传到 repo
  upload:
    needs: download
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: model-files
          path: dl

      - name: Split and Upload to Repo
        run: |
          python3 << 'PYEOF'
          import os, json, base64, urllib.request, subprocess as sp

          token = os.environ['GH_TOKEN']
          repo = os.environ['GITHUB_REPOSITORY']
          api_base = f'https://api.github.com/repos/{repo}/contents/tunnel_clip'

          # Split large files
          for f in os.listdir('dl'):
              sz = os.path.getsize(f'dl/{f}')
              print(f'{f}: {sz//1048576}MB')
              if sz > 40_000_000:
                  print(f'  Splitting...')
                  sp.run(['split', '-b', '40M', '-d', f'dl/{f}', f'dl/{f}.chunk_'], check=True)
                  os.remove(f'dl/{f}')

          # Upload each file
          files = sorted(os.listdir('dl'))
          print(f'Uploading {len(files)} files...')
          for fname in files:
              fpath = f'dl/{fname}'
              with open(fpath, 'rb') as fp:
                  content = base64.b64encode(fp.read()).decode()

              body = json.dumps({
                  'message': f'chunk: {fname}',
                  'content': content,
                  'branch': 'master'
              }).encode()

              url = f'{api_base}/{fname}'
              req = urllib.request.Request(url, data=body, method='PUT')
              req.add_header('Authorization', f'Bearer {token}')
              req.add_header('Accept', 'application/vnd.github+json')
              req.add_header('Content-Type', 'application/json')

              try:
                  resp = urllib.request.urlopen(req, timeout=120)
                  print(f'  OK {fname}')
              except urllib.error.HTTPError as e:
                  err = e.read().decode()[:200]
                  print(f'  FAIL {fname}: {err}')
          print('Done')
          PYEOF
        env:
          GH_TOKEN: ${{ github.token }}
