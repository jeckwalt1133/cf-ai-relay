name: GitTunnel
on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'HF仓库'
        required: true
        default: 'openai/clip-vit-large-patch14'
      pattern:
        description: '文件匹配'
        required: true
        default: '*'
      target_dir:
        description: '目标目录'
        required: false
        default: 'tunnel_data'

permissions:
  contents: write

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download from HuggingFace
        run: |
          pip install huggingface_hub -q
          python3 -c "
          from huggingface_hub import snapshot_download
          import os, subprocess as sp
          repo = '${{ inputs.repo }}'
          patterns = '${{ inputs.pattern }}'.split()
          out = '${{ inputs.target_dir }}'
          os.makedirs(out, exist_ok=True)
          snapshot_download(repo, allow_patterns=patterns, local_dir=out, local_dir_use_symlinks=False)
          for f in os.listdir(out):
              sz = os.path.getsize(f'{out}/{f}')
              print(f'{f}: {sz//1024//1024}MB')
              # Split files >40MB for API upload
              if sz > 40_000_000:
                  print(f'  Splitting {f}...')
                  sp.run(['split', '-b', '40M', '-d', f'{out}/{f}', f'{out}/{f}.part_'], check=True)
                  os.remove(f'{out}/{f}')
          print('Done. Files:')
          for f in sorted(os.listdir(out)):
              print(f'  {f}')
          "

      - name: Upload via gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd ${{ inputs.target_dir }}
          for f in *; do
            if [ -f "$f" ]; then
              sz=$(stat -c%s "$f" 2>/dev/null || ls -l "$f" | awk '{print $5}')
              if [ $sz -gt 90000000 ]; then
                echo "SKIP $f ($sz bytes) - too large, should have been split"
                continue
              fi
              echo "Uploading $f ($sz bytes)..."
              gh api repos/${{ github.repository }}/contents/${{ inputs.target_dir }}/$f \
                -X PUT \
                -f message="tunnel: $f" \
                -f content="$(base64 -w0 "$f")" \
                -f branch=master 2>&1 | head -3 || echo "FAILED: $f"
            fi
          done
