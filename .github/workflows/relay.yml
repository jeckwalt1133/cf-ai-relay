name: OpenAI

on:
  workflow_dispatch:
    inputs:
      api_key:
        required: true
        type: string
      prompt:
        required: true
        type: string
      system_prompt:
        required: false
        type: string
        default: 
      model:
        required: false
        type: string
        default: gpt-5.1

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: call
        shell: python
        run: |
          import json, os, urllib.request
          api_key = "${{ inputs.api_key }}"
          prompt = r"""${{ inputs.prompt }}"""
          system_prompt = r"""${{ inputs.system_prompt }}"""
          model = "${{ inputs.model }}"
          msgs = []
          if system_prompt.strip():
              msgs.append({"role": "system", "content": system_prompt})
          msgs.append({"role": "user", "content": prompt})
          body = json.dumps({"model": model, "messages": msgs, "temperature": 0.9, "max_completion_tokens": 3000}).encode()
          req = urllib.request.Request("https://api.openai.com/v1/chat/completions", data=body, headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"})
          resp = urllib.request.urlopen(req, timeout=120)
          data = json.loads(resp.read())
          content = data["choices"][0]["message"]["content"]
          print("===RESPONSE_START===")
          print(content)
          print("===RESPONSE_END===")
