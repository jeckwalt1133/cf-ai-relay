name: OpenAI Relay

on:
  workflow_dispatch:
    inputs:
      api_key:
        required: true
        type: string
      prompt:
        required: true
        type: string
      system_prompt:
        required: false
        type: string
        default: 
      model:
        required: false
        type: string
        default: gpt-5.1

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Call OpenAI
        shell: python
        env:
          OPENAI_KEY: ${{ inputs.api_key }}
          GPT_PROMPT: ${{ toJSON(inputs.prompt) }}
          GPT_SYSTEM: ${{ toJSON(inputs.system_prompt) }}
          GPT_MODEL: ${{ inputs.model }}
        run: |
          import json, os, urllib.request
          
          key = os.environ["OPENAI_KEY"]
          prompt = json.loads(os.environ["GPT_PROMPT"])
          system_prompt = json.loads(os.environ["GPT_SYSTEM"])
          model = os.environ["GPT_MODEL"]
          
          msgs = []
          if system_prompt:
            msgs.append({"role": "system", "content": system_prompt})
          msgs.append({"role": "user", "content": prompt})
          
          body = json.dumps({
            "model": model,
            "messages": msgs,
            "temperature": 0.9,
            "max_completion_tokens": 3000,
          }).encode()
          
          req = urllib.request.Request(
            "https://api.openai.com/v1/chat/completions",
            data=body,
            headers={
              "Content-Type": "application/json",
              "Authorization": f"Bearer {key}"
            }
          )
          resp = urllib.request.urlopen(req, timeout=120)
          data = json.loads(resp.read())
          
          content = data["choices"][0]["message"]["content"]
          print("===RESPONSE_START===")
          print(content)
          print("===RESPONSE_END===")
