name: OpenAI 中继

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'OpenAI API Key'
        required: true
        type: string
      prompt:
        description: '提示词'
        required: true
        type: string
      system_prompt:
        description: '系统提示词'
        required: false
        type: string
        default: ''
      model:
        description: '模型'
        required: false
        type: string
        default: 'gpt-5.5'

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: 调用 OpenAI API
        run: |
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ inputs.api_key }}" \
            -d "$(cat <<EOF
          {
            "model": "${{ inputs.model }}",
            "messages": [
              {"role": "system", "content": $(echo '${{ inputs.system_prompt }}' | jq -Rs .)},
              {"role": "user", "content": $(echo '${{ inputs.prompt }}' | jq -Rs .)}
            ],
            "temperature": 0.9,
            "max_tokens": 3000
          }
          EOF
          )")
          echo "=== RESULT_START ==="
          echo "$RESPONSE"
          echo "=== RESULT_END ==="
