name: OpenAI

on:
  workflow_dispatch:
    inputs:
      api_key:
        required: true
        type: string
      prompt:
        required: true
        type: string
      system_prompt:
        required: false
        type: string
        default: 
      model:
        required: false
        type: string
        default: gpt-5.1

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: call
        shell: python
        env:
          KEY: ${{ inputs.api_key }}
          PROMPT: ${{ toJSON(inputs.prompt) }}
          SYSTEM: ${{ toJSON(inputs.system_prompt) }}
          MODEL: ${{ inputs.model }}
          M1: XYZZYF4151B55START
          M2: XYZZYF4151B55END
        run: |
          import json, os, urllib.request
          key = os.environ['KEY']
          prompt = json.loads(os.environ['PROMPT'])
          system = json.loads(os.environ['SYSTEM'])
          model = os.environ['MODEL']
          msgs = []
          if system: msgs.append({'role':'system','content':system})
          msgs.append({'role':'user','content':prompt})
          body = json.dumps({'model':model,'messages':msgs,'temperature':1,'max_completion_tokens':3000}).encode()
          req = urllib.request.Request('https://api.openai.com/v1/chat/completions',data=body,headers={'Content-Type':'application/json','Authorization':f'Bearer {key}'})
          try:
            resp = urllib.request.urlopen(req, timeout=120)
            data = json.loads(resp.read())
            content = data['choices'][0]['message']['content']
            print(os.environ['M1'])
            print(content)
            print(os.environ['M2'])
          except Exception as e:
            body2 = ''
            try: body2 = e.read().decode()
            except: pass
            print(os.environ['M1'])
            print('ERR:' + str(e)[:500] + ' --- ' + body2[:500])
            print(os.environ['M2'])
