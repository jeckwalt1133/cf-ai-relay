# 墙外模型下载中继
name: HF Download Relay

on:
  workflow_dispatch:
    inputs:
      repo_id:
        description: 'HF仓库名'
        required: true
        type: string
        default: 'Abiray/Sulphur-2-base-GGUF'
      filename:
        description: '文件名'
        required: true
        type: string
        default: 'sulphur_dev-Q4_K_M.gguf'

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: 安装 huggingface_hub
        run: pip install huggingface_hub

      - name: 下载模型
        env:
          REPO_ID: ${{ inputs.repo_id }}
          FILENAME: ${{ inputs.filename }}
        run: |
          python3 << 'PYEOF'
          import os
          from huggingface_hub import hf_hub_download, list_repo_files

          repo = os.environ['REPO_ID']
          pattern = os.environ['FILENAME']

          files = list_repo_files(repo)
          matches = [f for f in files if pattern in f]
          if not matches:
              print(f'未匹配，可用文件: {files}')
              exit(1)

          target = matches[0]
          print(f'下载: {repo}/{target}')

          path = hf_hub_download(
              repo_id=repo,
              filename=target,
              resume_download=True,
              local_dir='./dl'
          )
          import shutil
          dest = os.path.basename(target)
          shutil.copy2(path, dest)
          print(f'文件: {dest} ({os.path.getsize(dest)} bytes)')
          PYEOF

      - name: 上传为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-file
          path: '*.gguf'
          retention-days: 7
