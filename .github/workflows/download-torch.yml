name: Download PyTorch CUDA Wheels (Split)
on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download torch CUDA cu126 wheels
        run: |
          mkdir -p wheels chunks
          BASE="https://download.pytorch.org/whl/cu126"
          for pkg in             "torch-2.6.0%2Bcu126-cp311-cp311-win_amd64.whl"             "torchvision-0.21.0%2Bcu126-cp311-cp311-win_amd64.whl"             "torchaudio-2.6.0%2Bcu126-cp311-cp311-win_amd64.whl"; do
            wget -q "$BASE/$pkg" -P wheels/ && echo "OK $pkg" || echo "FAIL $pkg"
          done
          ls -lh wheels/
          # 拆成30MB小块
          cd wheels
          for f in *.whl; do
            split -b 30M -d "$f" "../chunks/${f}_part_"
          done
          cd ..
          ls -lh chunks/
          
      - name: Upload chunks
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-chunks
          path: chunks/*
          retention-days: 3
