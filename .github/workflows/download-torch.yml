name: Download PyTorch CUDA Wheel

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download torch wheel
        run: |
          pip download torch torchvision torchaudio             --index-url https://download.pytorch.org/whl/cu131             --platform win_amd64             --python-version 3.11             --only-binary :all:             -d ./wheels
          ls -lh ./wheels/
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-cu131-wheels
          path: ./wheels/*.whl
          retention-days: 3
