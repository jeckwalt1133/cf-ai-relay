name: Release Torch Wheel
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download torch whl
        run: |
          wget -q "https://download.pytorch.org/whl/cu126/torch-2.6.0%2Bcu126-cp311-cp311-win_amd64.whl" -O torch.whl ||           curl -sL "https://download.pytorch.org/whl/cu126/torch-2.6.0%2Bcu126-cp311-cp311-win_amd64.whl" -o torch.whl
          ls -lh torch.whl
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: torch-cuda-v1
          name: 'PyTorch 2.6.0 CUDA 12.6'
          files: torch.whl
          fail_on_unmatched_files: true
