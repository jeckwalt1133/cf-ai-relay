name: Download Torch CUDA Only
on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download torch only
        run: |
          mkdir -p chunks
          wget -q "https://download.pytorch.org/whl/cu126/torch-2.6.0%2Bcu126-cp311-cp311-win_amd64.whl" -O torch.whl
          ls -lh torch.whl
          split -b 150M -d torch.whl chunks/torch_part_
          ls -lh chunks/
          
      - name: Upload chunk 0
        uses: actions/upload-artifact@v4
        with:
          name: torch-part-0
          path: chunks/torch_part_00
          retention-days: 3
      - name: Upload chunk 1
        uses: actions/upload-artifact@v4
        with:
          name: torch-part-1
          path: chunks/torch_part_01
          retention-days: 3
      - name: Upload chunk 2
        uses: actions/upload-artifact@v4
        with:
          name: torch-part-2
          path: chunks/torch_part_02
          retention-days: 3
      - name: Upload remaining
        run: |
          for f in chunks/torch_part_*; do
            name=
            if [ "" != "torch_part_00" ] && [ "" != "torch_part_01" ] && [ "" != "torch_part_02" ]; then
              echo "Uploading ..."
            fi
          done
